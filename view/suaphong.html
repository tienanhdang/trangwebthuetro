<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa thông tin phòng trọ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { 
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            --glass: rgba(255, 255, 255, 0.95); 
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--primary-gradient); 
            background-attachment: fixed; 
            margin: 0; 
            min-height: 100vh; 
        }
        .nav-bar { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            padding: 15px 30px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
            display: flex;
            gap: 20px;
        }
        .nav-bar a { color: white; text-decoration: none; font-weight: bold; }
        
        .form-container { 
            background: var(--glass); 
            padding: 40px; 
            border-radius: 24px; 
            max-width: 700px; 
            margin: 40px auto; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
        }
        h2 { text-align: center; color: #2d3436; margin-bottom: 25px; }
        h3 { font-size: 18px; color: #4a5568; margin: 25px 0 15px; border-left: 4px solid #667eea; padding-left: 10px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #718096; margin-bottom: 5px; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 2px solid #edf2f7; 
            border-radius: 12px; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s;
            font-size: 15px;
        }
        input:focus, select:focus { border-color: #667eea; }

        #map-selection { 
            width: 100%; 
            height: 350px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            border: 3px solid white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        
        .btn-save { 
            padding: 16px; 
            background: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        .btn-cancel { 
            padding: 16px; 
            background: #7f8c8d; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .hint { font-size: 13px; color: #718096; margin-top: -15px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html">🏠 Trang chủ</a>
    <a href="quanlyphong.html">⬅️ Quay lại quản lý</a>
</div>

<div class="form-container">
    <h2>✏️ Cập nhật thông tin phòng</h2>

    <label>Tiêu đề bài viết</label>
    <input id="tieu_de" placeholder="Ví dụ: Phòng trọ khép kín gần trung tâm...">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
            <label>Giá tiền (VNĐ/tháng)</label>
            <input id="gia_tien" type="number" placeholder="3500000">
        </div>
        <div>
            <label>Diện tích (m²)</label>
            <input id="dien_tich" type="number" placeholder="25">
        </div>
    </div>

    <label>Địa chỉ cụ thể (Số nhà, tên đường)</label>
    <input id="dia_chi" placeholder="Số 5 Phố Hàng Bạc..." onchange="updateMapFromAddress()">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
            <label>Thành phố</label>
            <select id="thanh_pho" onchange="loadPhuongXa(); updateMapFromAddress();">
                <option value="">Chọn thành phố</option>
                <option value="Hà Nội">Hà Nội</option>
                <option value="Hồ Chí Minh">Thành phố Hồ Chí Minh</option>
            </select>
        </div>
        <div>
            <label>Phường xã</label>
            <select id="phuong_xa" onchange="updateMapFromAddress()">
                <option value="">Chọn phường xã</option>
            </select>
        </div>
    </div>

    <label>Mô tả chi tiết</label>
    <textarea id="mo_ta" rows="4" placeholder="Thông tin về điện nước, tiện ích..."></textarea>

    <label>Trạng thái phòng</label>
    <select id="trang_thai">
        <option value="con_trong">🟢 Còn trống</option>
        <option value="o_ghep">🟡 Ở ghép</option>
        <option value="da_thue">🔴 Đã thuê</option>
    </select>

    <h3>🖼️ Hình ảnh (Tải lên để thay thế)</h3>
    <span class="hint">Để trống nếu muốn giữ nguyên ảnh cũ.</span>
    <input type="file" id="images" multiple accept="image/*">

    <h3>📍 Vị trí trên bản đồ</h3>
    <span class="hint">Click hoặc kéo marker để định vị chính xác.</span>
    <div id="map-selection"></div>
    
    <input type="hidden" id="lat">
    <input type="hidden" id="lng">

    <div class="btn-group">
        <button onclick="save()" class="btn-save">LƯU THAY ĐỔI</button>
        <button onclick="cancel()" class="btn-cancel">HỦY BỎ</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, marker;
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    const phuongXaHaNoi = ["Hoàn Kiếm","Cửa Nam","Ba Đình","Ngọc Hà","Giảng Võ","Hai Bà Trưng","Vĩnh Tuy","Bạch Mai","Đống Đa","Kim Liên","Văn Miếu - Quốc Tử Giám","Láng","Ô Chợ Dừa","Hồng Hà","Lĩnh Nam","Hoàng Mai","Vĩnh Hưng","Tương Mai","Định Công","Hoàng Liệt","Yên Sở","Thanh Xuân","Khương Đình","Phương Liệt","Cầu Giấy","Nghĩa Đô","Yên Hòa","Tây Hồ","Phú Thượng","Tây Tựu","Phú Diễn","Xuân Đỉnh","Đông Ngạc","Thượng Cát","Từ Liêm","Xuân Phương","Tây Mỗ","Đại Mỗ","Long Biên","Bồ Đề","Việt Hưng","Phúc Lợi","Hà Đông","Dương Nội","Yên Nghĩa","Phú Lương","Kiến Hưng","Thanh Liệt"];
    const phuongXaHCM = ['Phường Sài Gòn','Phường Tân Định','Phường Bến Thành','Phường Cầu Ông Lãnh','Phường Bàn Cờ','Phường Xuân Hòa','Phường Nhiêu Lộc','Phường Xóm Chiếu','Phường Khánh Hội','Phường Vĩnh Hội','Phường Chợ Quán','Phường An Đông','Phường Chợ Lớn','Phường Bình Tây','Phường Bình Tiên','Phường Bình Phú','Phường Phú Lâm','Phường Tân Thuận','Phường Phú Thuận','Phường Tân Mỹ','Phường Tân Hưng','Phường Chánh Hưng','Phường Phú Định','Phường Bình Đông','Phường Diên Hồng','Phường Vườn Lài','Phường Hòa Hưng','Phường Minh Phụng','Phường Bình Thới','Phường Hòa Bình','Phường Phú Thọ','Phường Đông Hưng Thuận','Phường Trung Mỹ Tây','Phường Tân Thới Hiệp','Phường Thới An','Phường An Phú Đông','Phường An Lạc','Phường Bình Tân','Phường Tân Tạo','Phường Bình Trị Đông','Phường Bình Hưng Hòa','Phường Gia Định','Phường Bình Thạnh','Phường Bình Lợi Trung','Phường Thạnh Mỹ Tây','Phường Bình Quới','Phường Hạnh Thông','Phường An Nhơn','Phường Gò Vấp','Phường An Hội Đông','Phường Thông Tây Hội','Phường An Hội Tây','Phường Đức Nhuận','Phường Cầu Kiệu','Phường Phú Nhuận','Phường Tân Sơn Hòa','Phường Tân Sơn Nhất','Phường Tân Hòa','Phường Bảy Hiền','Phường Tân Bình','Phường Tân Sơn','Phường Tây Thạnh','Phường Tân Sơn Nhì','Phường Phú Thọ Hòa','Phường Tân Phú','Phường Phú Thạnh','Phường Hiệp Bình','Phường Thủ Đức','Phường Tam Bình','Phường Linh Xuân','Phường Tăng Nhơn Phú','Phường Long Bình','Phường Long Phước','Phường Long Trường','Phường Cát Lái','Phường Bình Trưng','Phường Phước Long','Phường An Khánh'];

    function initLeafletMap() {
        const defaultLat = 21.0285;
        const defaultLng = 105.8542;
        
        map = L.map('map-selection').setView([defaultLat, defaultLng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        map.on('click', function(e) {
            updateMarker(e.latlng.lat, e.latlng.lng);
        });
    }

    function updateMarker(lat, lng) {
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lng], {draggable: true}).addTo(map);
        document.getElementById("lat").value = lat;
        document.getElementById("lng").value = lng;

        marker.on('dragend', function() {
            const pos = marker.getLatLng();
            document.getElementById("lat").value = pos.lat;
            document.getElementById("lng").value = pos.lng;
        });
    }

    async function updateMapFromAddress() {
        const diaChi = document.getElementById("dia_chi").value;
        const thanhPhoSelect = document.getElementById("thanh_pho");
        const phuongXaSelect = document.getElementById("phuong_xa");
        
        const thanhPhoText = thanhPhoSelect.value;
        const phuongXaText = phuongXaSelect.value;

        if (!thanhPhoText) return;

        let query = `${thanhPhoText}, Việt Nam`;
        if (phuongXaText) query = `${phuongXaText}, ${query}`;
        if (diaChi) query = `${diaChi}, ${query}`;

        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;

        try {
            const response = await fetch(url);
            const results = await response.json();
            if (results && results.length > 0) {
                const lat = parseFloat(results[0].lat);
                const lon = parseFloat(results[0].lon);
                map.flyTo([lat, lon], diaChi ? 16 : 13);
                updateMarker(lat, lon);
            }
        } catch (error) {
            console.error("Lỗi tìm kiếm bản đồ:", error);
        }
    }

    function loadPhuongXa() {
        const thanhPho = document.getElementById('thanh_pho').value;
        const phuongXaSelect = document.getElementById('phuong_xa');
        phuongXaSelect.innerHTML = '<option value="">Chọn phường xã</option>';
        
        let data = [];
        if (thanhPho === 'Hà Nội') data = phuongXaHaNoi;
        else if (thanhPho === 'Hồ Chí Minh') data = phuongXaHCM;

        data.forEach(item => {
            const option = document.createElement('option');
            option.value = item;
            option.textContent = item;
            phuongXaSelect.appendChild(option);
        });
    }

    async function loadRoomData() {
        const token = localStorage.getItem('token');
        if(!token) { 
            alert("Vui lòng đăng nhập!"); 
            window.location.href = "dangnhap.html";
            return; 
        }

        try {
            const res = await fetch(`http://localhost:3000/phongtro/${id}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            
            if(res.ok) {
                document.getElementById("tieu_de").value = data.tieu_de || "";
                document.getElementById("gia_tien").value = data.gia_tien || "";
                document.getElementById("dien_tich").value = data.dien_tich || "";
                document.getElementById("dia_chi").value = data.dia_chi || "";
                document.getElementById("thanh_pho").value = data.thanh_pho || "";
                
                loadPhuongXa();
                document.getElementById("phuong_xa").value = data.quan_huyen || "";
                document.getElementById("mo_ta").value = data.mo_ta || "";
                document.getElementById("trang_thai").value = data.trang_thai || "con_trong";
                
                if (data.vi_do && data.kinh_do) {
                    const lat = parseFloat(data.vi_do);
                    const lng = parseFloat(data.kinh_do);
                    map.setView([lat, lng], 16);
                    updateMarker(lat, lng);
                }
            }
        } catch (error) {
            console.error("Lỗi tải dữ liệu:", error);
        }
    }

    async function save() {
        const token = localStorage.getItem('token');
        const formData = new FormData();
        
        formData.append("tieu_de", document.getElementById("tieu_de").value);
        formData.append("gia_tien", document.getElementById("gia_tien").value);
        formData.append("dien_tich", document.getElementById("dien_tich").value);
        formData.append("dia_chi", document.getElementById("dia_chi").value);
        formData.append("quan_huyen", document.getElementById("phuong_xa").value);
        formData.append("thanh_pho", document.getElementById("thanh_pho").value);
        formData.append("mo_ta", document.getElementById("mo_ta").value);
        formData.append("vi_do", document.getElementById("lat").value);
        formData.append("kinh_do", document.getElementById("lng").value);
        formData.append("trang_thai", document.getElementById("trang_thai").value);

        const files = document.getElementById("images").files;
        for (let i = 0; i < files.length; i++) {
            formData.append("images", files[i]);
        }

        try {
            const res = await fetch(`http://localhost:3000/phongtro/${id}`, {
                method: "PUT",
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            
            if(res.ok) {
                alert("Cập nhật thành công!");
                window.location.href = "quanlyphong.html";
            } else {
                const err = await res.json();
                alert("Lỗi: " + err.message);
            }
        } catch (error) {
            alert("Lỗi kết nối server.");
        }
    }

    function cancel() {
        if (confirm("Hủy các thay đổi?")) window.location.href = "quanlyphong.html";
    }

    // Chạy khởi tạo
    initLeafletMap();
    loadRoomData();
</script>

</body>
</html>
