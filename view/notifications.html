<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --danger-gradient: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            --glass: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: white;
        }

        #auth-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #auth-area a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        #auth-area a:hover {
            background: white;
            color: #764ba2;
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            color: white;
            font-size: 36px;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* Stats */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }

        /* Notification List */
        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .notification-card {
            background: var(--glass);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .notification-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .notification-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary-gradient);
        }

        .notification-card.unread {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
        }

        .notification-card.unread::before {
            background: var(--warning-gradient);
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .notification-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .notification-icon.booking {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
        }

        .notification-icon.cancel {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #991b1b;
        }

        .notification-icon.message {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #1e40af;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .notification-message {
            color: #4a5568;
            line-height: 1.6;
            font-size: 14px;
        }

        .notification-time {
            color: #9ca3af;
            font-size: 12px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .notification-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-success {
            background: var(--success-gradient);
            color: white;
        }

        .btn-danger {
            background: var(--danger-gradient);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-mark-read {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .btn-mark-read:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--glass);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .empty-text {
            color: #666;
            margin-bottom: 20px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .page-title {
                font-size: 28px;
            }

            .notification-card {
                padding: 20px;
            }

            .notification-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🏠 PHONGTRO</div>
    <div id="auth-area">
        <a href="index.html">🏠 Trang chủ</a>
        <a href="#" onclick="logout()">🚪 Đăng xuất</a>
    </div>
</header>

<div class="container">
    <h1 class="page-title">🔔 Thông báo</h1>

    <!-- Stats -->
    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-number" id="stat-total">0</div>
            <div class="stat-label">Tổng thông báo</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-unread">0</div>
            <div class="stat-label">Chưa đọc</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-bookings">0</div>
            <div class="stat-label">Đặt phòng</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-messages">0</div>
            <div class="stat-label">Tin nhắn</div>
        </div>
    </div>

    <!-- Notification List -->
    <div id="notification-list" class="notification-list">
        <p style="text-align: center; color: white;">Đang tải thông báo...</p>
    </div>
</div>

<script>
    // Kiểm tra đăng nhập
    function checkLogin() {
        const token = localStorage.getItem('token');
        if (!token) {
            alert("⚠️ Vui lòng đăng nhập!");
            window.location.href = 'dangnhap.html';
            return false;
        }

        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.role !== 'chu_tro') {
            alert("⚠️ Chức năng này chỉ dành cho chủ trọ!");
            window.location.href = 'index.html';
            return false;
        }

        return true;
    }

    // Load danh sách thông báo
    async function loadNotifications() {
        if (!checkLogin()) return;

        const token = localStorage.getItem('token');
        const container = document.getElementById('notification-list');

        try {
            const res = await fetch('/api/notifications', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (!res.ok) {
                throw new Error('Không thể tải thông báo');
            }

            const notifications = await res.json();

            if (notifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔔</div>
                        <div class="empty-title">Chưa có thông báo</div>
                        <div class="empty-text">Khi có đặt phòng hoặc tin nhắn mới, thông báo sẽ xuất hiện tại đây.</div>
                        <a href="index.html" class="btn-primary">
                            <i class="fas fa-home"></i> Về trang chủ
                        </a>
                    </div>
                `;
                return;
            }

            // Cập nhật thống kê
            document.getElementById('stat-total').textContent = notifications.length;
            document.getElementById('stat-unread').textContent = notifications.filter(n => !n.is_read).length;
            document.getElementById('stat-bookings').textContent = notifications.filter(n => n.type.includes('booking')).length;
            document.getElementById('stat-messages').textContent = notifications.filter(n => n.type === 'message').length;

            // Hiển thị danh sách thông báo
            container.innerHTML = notifications.map(notification => {
                let iconClass = '';
                let iconSymbol = '';
                
                if (notification.type === 'booking_pending') {
                    iconClass = 'booking';
                    iconSymbol = '📋';
                } else if (notification.type === 'booking_confirmed') {
                    iconClass = 'success';
                    iconSymbol = '✅';
                } else if (notification.type === 'booking_rejected') {
                    iconClass = 'danger';
                    iconSymbol = '❌';
                } else if (notification.type === 'booking_cancel') {
                    iconClass = 'cancel';
                    iconSymbol = '🚫';
                } else if (notification.type === 'cancel_confirmed') {
                    iconClass = 'success';
                    iconSymbol = '👍';
                } else if (notification.type === 'message') {
                    iconClass = 'message';
                    iconSymbol = '💬';
                } else {
                    iconClass = 'booking';
                    iconSymbol = '🔔';
                }

                const time = formatTime(notification.created_at);
                const isUnread = !notification.is_read;

                return `
                    <div class="notification-card ${isUnread ? 'unread' : ''}" id="notification-${notification.id}">
                        <div class="notification-header">
                            <div style="display: flex; align-items: flex-start;">
                                <div class="notification-icon ${iconClass}">
                                    ${iconSymbol}
                                </div>
                                <div class="notification-content">
                                    <div class="notification-title">${getNotificationTitle(notification.type)}</div>
                                    <div class="notification-message">${notification.message}</div>
                                    <div class="notification-time">
                                        <i class="fas fa-clock"></i>
                                        ${time}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="notification-actions">
                            ${isUnread ? `
                                <button class="btn btn-mark-read" onclick="markAsRead(${notification.id})">
                                    <i class="fas fa-check"></i> Đánh dấu đã đọc
                                </button>
                            ` : ''}
                            ${notification.type === 'message' ? `
                                <button class="btn btn-primary" onclick="replyToMessage(${notification.id})">
                                    <i class="fas fa-reply"></i> Trả lời
                                </button>
                            ` : ''}
                            ${notification.type === 'booking_pending' ? `
                                <button class="btn btn-success" onclick="confirmBooking(${notification.id})">
                                    <i class="fas fa-check"></i> Xác nhận
                                </button>
                                <button class="btn btn-danger" onclick="rejectBooking(${notification.id})">
                                    <i class="fas fa-times"></i> Từ chối
                                </button>
                            ` : ''}
                            ${notification.type === 'booking_cancel' ? `
                                <button class="btn btn-success" onclick="confirmCancel(${notification.id})">
                                    <i class="fas fa-check"></i> Xác nhận hủy
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

        } catch (err) {
            console.error("Lỗi:", err);
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div class="empty-title">Lỗi tải thông báo</div>
                    <div class="empty-text">${err.message}</div>
                    <button class="btn-primary" onclick="loadNotifications()">
                        <i class="fas fa-refresh"></i> Thử lại
                    </button>
                </div>
            `;
        }
    }

    // Lấy tiêu đề thông báo
    function getNotificationTitle(type) {
        const titles = {
            'booking_pending': '📋 Đặt phòng mới',
            'booking_confirmed': '✅ Đặt phòng đã xác nhận',
            'booking_rejected': '❌ Đặt phòng bị từ chối',
            'booking_cancel': '🚫 Yêu cầu hủy phòng',
            'cancel_confirmed': '✅ Đã xác nhận hủy phòng',
            'message': '💬 Tin nhắn mới'
        };
        return titles[type] || '🔔 Thông báo';
    }

    // Format thời gian
    function formatTime(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const diff = now - date;
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);

        if (minutes < 1) return 'Vừa xong';
        if (minutes < 60) return `${minutes} phút trước`;
        if (hours < 24) return `${hours} giờ trước`;
        if (days < 7) return `${days} ngày trước`;
        return date.toLocaleDateString('vi-VN');
    }

    // Đánh dấu đã đọc
    async function markAsRead(notificationId) {
        const token = localStorage.getItem('token');

        try {
            const res = await fetch(`/api/notifications/${notificationId}/read`, {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (res.ok) {
                // Cập nhật UI
                const card = document.getElementById(`notification-${notificationId}`);
                card.classList.remove('unread');
                const actions = card.querySelector('.notification-actions');
                if (actions) actions.remove();

                // Cập nhật thống kê
                loadNotifications();
            }
        } catch (err) {
            console.error("Lỗi:", err);
        }
    }

    // Đánh dấu tất cả đã đọc
    async function markAllAsRead() {
        const token = localStorage.getItem('token');

        try {
            const res = await fetch('/api/notifications/read-all', {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (res.ok) {
                loadNotifications();
            }
        } catch (err) {
            console.error("Lỗi:", err);
        }
    }

    // Trả lời tin nhắn
    async function replyToMessage(notificationId) {
        const token = localStorage.getItem('token');
        
        try {
            // Lấy thông tin notification
            const res = await fetch('/api/notifications', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            
            if (!res.ok) {
                alert('Không thể tải thông tin thông báo');
                return;
            }
            
            const notifications = await res.json();
            const notification = notifications.find(n => n.id === notificationId);
            
            if (!notification) {
                alert('Không tìm thấy thông báo');
                return;
            }
            
            if (!notification.sender_id) {
                alert('Không tìm thấy thông tin người gửi');
                return;
            }
            
            // Tạo hoặc lấy conversation với người gửi
            const createConvRes = await fetch('/api/chat/create-conversation', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ userId: notification.sender_id })
            });
            
            if (!createConvRes.ok) {
                alert('Không thể tạo cuộc trò chuyện');
                return;
            }
            
            const convData = await createConvRes.json();
            
            // Chuyển đến trang chat với conversation ID
            window.location.href = `chat.html?conversation=${convData.conversation.id}`;
            
            // Đánh dấu đã đọc
            await markAsRead(notificationId);
            
        } catch (err) {
            console.error("Lỗi:", err);
            alert('Không thể mở chat');
        }
    }

    // Xác nhận đặt phòng
    async function confirmBooking(notificationId) {
        const token = localStorage.getItem('token');
        
        try {
            // Lấy thông tin notification
            const res = await fetch('/api/notifications', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            
            if (!res.ok) {
                alert('Không thể tải thông tin thông báo');
                return;
            }
            
            const notifications = await res.json();
            const notification = notifications.find(n => n.id == notificationId);
            
            if (!notification) {
                alert('Không tìm thấy thông báo');
                return;
            }
            
            // Parse bookingId từ message
            const bookingId = getBookingIdFromNotification(notification);
            if (!bookingId) {
                alert('Không tìm thấy mã đặt phòng');
                return;
            }

            const confirmRes = await fetch(`/api/bookings/${bookingId}/confirm`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (!confirmRes.ok) {
                const errData = await confirmRes.json();
                alert('❌ ' + (errData.error || 'Không thể xác nhận đặt phòng'));
                return;
            }

            alert('✅ Đã xác nhận đặt phòng thành công!');
            
            // Đánh dấu đã đọc
            await markAsRead(notificationId);
            loadNotifications(); // Reload list
            
        } catch (err) {
            console.error("Lỗi:", err);
            alert('Không thể xác nhận đặt phòng');
        }
    }

    function getBookingIdFromNotification(notification) {
        if (notification.booking_id) {
            return notification.booking_id;
        }

        if (!notification.message) {
            return null;
        }

        const patterns = [
            /BOOKING_ID\s*[:=]?\s*(\d+)/i,
            /BOOKING_ID(\d+)/i
        ];

        for (const pattern of patterns) {
            const match = notification.message.match(pattern);
            if (match) {
                return match[1];
            }
        }

        return null;
    }

    // Từ chối đặt phòng
    async function rejectBooking(notificationId) {
        const token = localStorage.getItem('token');
        
        if (!confirm('Bạn có chắc chắn muốn từ chối đặt phòng này?')) {
            return;
        }
        
        try {
            const res = await fetch('/api/notifications', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) {
                alert('Không thể tải thông tin thông báo');
                return;
            }

            const notifications = await res.json();
            const notification = notifications.find(n => n.id == notificationId);
            if (!notification) {
                alert('Không tìm thấy thông báo');
                return;
            }

            const bookingId = getBookingIdFromNotification(notification);
            if (!bookingId) {
                alert('Không tìm thấy mã đặt phòng');
                return;
            }

            const rejectRes = await fetch(`/api/bookings/${bookingId}/reject`, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ reason: '' })
            });

            if (!rejectRes.ok) {
                const errData = await rejectRes.json();
                alert('❌ ' + (errData.error || 'Không thể từ chối đặt phòng'));
                return;
            }

            alert('✅ Đã từ chối đặt phòng thành công!');
            await markAsRead(notificationId);
            loadNotifications();
        } catch (err) {
            console.error("Lỗi:", err);
            alert('Không thể từ chối đặt phòng');
        }
    }

    // Xác nhận hủy phòng
    async function confirmCancel(notificationId) {
        const token = localStorage.getItem('token');
        
        try {
            const res = await fetch('/api/notifications', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) {
                alert('Không thể tải thông tin thông báo');
                return;
            }

            const notifications = await res.json();
            const notification = notifications.find(n => n.id == notificationId);
            if (!notification) {
                alert('Không tìm thấy thông báo');
                return;
            }

            const bookingId = getBookingIdFromNotification(notification);
            if (!bookingId) {
                alert('Không tìm thấy mã đặt phòng');
                return;
            }

            const confirmRes = await fetch(`/api/bookings/${bookingId}/confirm-cancel`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (!confirmRes.ok) {
                const errData = await confirmRes.json();
                alert('❌ ' + (errData.error || 'Không thể xác nhận hủy phòng'));
                return;
            }

            alert('✅ Đã xác nhận hủy phòng thành công!');
            await markAsRead(notificationId);
            loadNotifications();
        } catch (err) {
            console.error("Lỗi:", err);
            alert('Không thể xác nhận hủy phòng');
        }
    }

    // Đăng xuất
    function logout() {
        if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
    }

    // Socket.io cho realtime notifications
    const socket = io();
    socket.on('connect', () => {
        const token = localStorage.getItem('token');
        if (token) {
            const payload = JSON.parse(atob(token.split('.')[1]));
            socket.emit('join_user_room', payload.id);
        }
    });

    socket.on('new_notification', (data) => {
        // Hiển thị toast notification
        showToast(data.message, 'info');
        // Reload danh sách
        loadNotifications();
        updateUnreadCount();
    });

    function showToast(message, type = 'info') {
        // Simple toast implementation
        const toast = document.createElement('div');
        toast.style.cssText = `
            position: fixed; top: 20px; right: 20px; background: #333; color: white; 
            padding: 10px 20px; border-radius: 5px; z-index: 1000;
        `;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => document.body.removeChild(toast), 3000);
    }

    // Khởi tạo
    document.addEventListener('DOMContentLoaded', loadNotifications);
</script>

</body>
</html>
