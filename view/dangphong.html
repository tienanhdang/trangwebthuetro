<html>
<body>
<h2>Thêm phòng</h2>
<input id="ten" placeholder="Tên">
<input id="gia" placeholder="Giá">
<input id="diachi" placeholder="Địa chỉ">
<textarea id="mota"></textarea>
<button onclick="add()">Đăng</button>

<script>
async function add(){
  await fetch('http://localhost:3000/api/rooms',{
    method:'POST',
    headers:{'Content-Type':'application/json',Authorization:localStorage.getItem('token')},
    body:JSON.stringify({ten:ten.value,gia:gia.value,diachi:diachi.value,mota:mota.value})
  });
  alert('Đăng thành công');
}
</script>
</body>
</html>
