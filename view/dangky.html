<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tham gia cùng chúng tôi</title>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* Lớp phủ mờ cho nền */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.8) 0%, rgba(118, 75, 162, 0.8) 100%);
            z-index: -1;
        }

        .nav-bar {
            position: absolute;
            top: 30px;
            left: 30px;
        }

        .nav-bar a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .nav-bar a:hover {
            background: white;
            color: var(--secondary-color);
        }

        /* Container với hiệu ứng Glassmorphism */
        .register-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: var(--text-color);
            margin-bottom: 5px;
            font-size: 28px;
            font-weight: 800;
        }

        p.subtitle {
            color: #636e72;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            font-weight: 700;
            color: #2d3436;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8fafc;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(102, 126, 234, 0.4);
            filter: brightness(1.1);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 15px;
            color: #636e72;
        }

        .footer-text a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Responsive cho Mobile */
        @media (max-width: 480px) {
            .register-container { padding: 30px 20px; }
            .nav-bar { top: 15px; left: 15px; }
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html">🏠 Trang chủ</a>
</div>

<div class="register-container">
    <h2>Tạo tài khoản</h2>
    <p class="subtitle">Tìm kiếm hoặc cho thuê phòng trọ nhanh chóng</p>
    
    <div class="input-group">
        <label>Họ và tên</label>
        <input id="ho_ten" placeholder="Nguyễn Văn A">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 2;">
            <label>Email</label>
            <input id="email" type="email" placeholder="example@gmail.com">
        </div>
        <div class="input-group" style="flex: 1.5;">
            <label>Điện thoại</label>
            <input id="so_dien_thoai" type="tel" placeholder="09xx...">
        </div>
    </div>

    <div class="input-group">
        <label>Tên tài khoản</label>
        <input id="ten_tai_khoan" placeholder="username123">
    </div>

    <div class="input-group">
        <label>Mật khẩu</label>
        <input id="mat_khau" type="password" placeholder="••••••••">
    </div>

    <div class="input-group">
        <label>Bạn là ai?</label>
        <select id="role">
            <option value="sinh_vien">👤 Tôi muốn tìm thuê phòng</option>
            <option value="chu_tro">🏠 Tôi là chủ cho thuê phòng</option>
        </select>
    </div>

    <button onclick="register()">Đăng ký ngay</button>

    <div class="footer-text">
        Bạn đã có tài khoản? <a href="dangnhap.html">Đăng nhập</a>
    </div>
</div>

<script>
async function register(){
    const fields = ['ho_ten', 'email', 'so_dien_thoai', 'ten_tai_khoan', 'mat_khau', 'role'];
    const body = {};
    
    let isvalid = true;
    fields.forEach(f => {
        body[f] = document.getElementById(f).value.trim();
        if(!body[f]) isvalid = false;
    });

    if(!isvalid) {
        alert("⚠️ Vui lòng không để trống bất kỳ thông tin nào!");
        return;
    }

    try {
        const res = await fetch('http://localhost:3000/users/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });

        const data = await res.json();

        if(res.ok){
            alert("🎉 Tuyệt vời! Bạn đã đăng ký thành công.");
            window.location.href = "dangnhap.html";
        } else {
            alert("❌ " + (data.message || "Lỗi đăng ký"));
        }
    } catch (error) {
        alert("📡 Lỗi kết nối server, vui lòng thử lại sau!");
    }
}
</script>

</body>
</html>
