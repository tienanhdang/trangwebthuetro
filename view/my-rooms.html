<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng của tôi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --danger-gradient: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            --glass: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: white;
        }

        #auth-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #auth-area a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        #auth-area a:hover {
            background: white;
            color: #764ba2;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            color: white;
            font-size: 36px;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* Stats */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Room Cards */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .room-card {
            background: var(--glass);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .room-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .room-content {
            padding: 25px;
        }

        .room-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 10px;
        }

        .room-price {
            font-size: 22px;
            color: #e53e3e;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .room-info {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        .room-info-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #666;
            font-size: 14px;
        }

        .room-status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-pending {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
        }

        .status-confirmed {
            background: linear-gradient(135deg, #d1f2eb 0%, #a7f3d0 100%);
            color: #065f46;
        }

        .status-cancelled {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #991b1b;
        }

        .room-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-view {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-cancel {
            background: var(--danger-gradient);
            color: white;
        }

        .btn-view:hover, .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--glass);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .empty-text {
            color: #666;
            margin-bottom: 20px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .page-title {
                font-size: 28px;
            }

            .rooms-grid {
                grid-template-columns: 1fr;
            }

            .room-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🏠 PHONGTRO</div>
    <div id="auth-area">
        <a href="index.html">🏠 Trang chủ</a>
        <a href="#" onclick="logout()">🚪 Đăng xuất</a>
    </div>
</header>

<div class="container">
    <h1 class="page-title">🏠 Phòng của tôi</h1>

    <!-- Stats -->
    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-number" id="stat-total">0</div>
            <div class="stat-label">Tổng số phòng</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-pending">0</div>
            <div class="stat-label">Chờ xác nhận</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-confirmed">0</div>
            <div class="stat-label">Đã đặt</div>
        </div>
    </div>

    <!-- Rooms List -->
    <div id="rooms-list" class="rooms-grid">
        <p style="text-align: center; color: white; grid-column: 1/-1;">Đang tải dữ liệu...</p>
    </div>
</div>

<script>
    // Kiểm tra đăng nhập
    function checkLogin() {
        const token = localStorage.getItem('token');
        if (!token) {
            alert("⚠️ Vui lòng đăng nhập!");
            window.location.href = 'dangnhap.html';
            return false;
        }

        return true;
    }

    // Load danh sách phòng đã đặt
    async function loadMyRooms() {
        if (!checkLogin()) return;

        const token = localStorage.getItem('token');
        const container = document.getElementById('rooms-list');

        try {
            const res = await fetch('/api/bookings/my-bookings', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (!res.ok) {
                throw new Error('Không thể tải danh sách phòng');
            }

            const bookings = await res.json();
            const activeBookings = bookings.filter(b =>
                ['pending', 'confirmed'].includes((b.trang_thai || '').toLowerCase())
            );

            if (activeBookings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">🏠</div>
                        <div class="empty-title">Bạn không có phòng đang hoạt động</div>
                        <div class="empty-text">Các đơn đã hủy sẽ không hiển thị tại đây.</div>
                        <a href="index.html" class="btn-primary">
                            <i class="fas fa-search"></i> Tìm phòng ngay
                        </a>
                    </div>
                `;
                return;
            }

            // Cập nhật thống kê
            document.getElementById('stat-total').textContent = activeBookings.length;
            document.getElementById('stat-pending').textContent = activeBookings.filter(b => b.trang_thai === 'pending').length;
            document.getElementById('stat-confirmed').textContent = activeBookings.filter(b => b.trang_thai === 'confirmed').length;

            // Hiển thị danh sách phòng
            container.innerHTML = activeBookings.map(booking => {
                let statusClass = '';
                let statusText = '';
                
                if (booking.trang_thai === 'pending') {
                    statusClass = 'status-pending';
                    statusText = '⏳ Chờ xác nhận';
                } else if (booking.trang_thai === 'confirmed') {
                    statusClass = 'status-confirmed';
                    statusText = '✅ Đã đặt';
                } else if (booking.trang_thai === 'cancelled') {
                    statusClass = 'status-cancelled';
                    statusText = '❌ Đã hủy';
                }

                const ngayNhanPhong = new Date(booking.ngay_nhan_phong).toLocaleDateString('vi-VN');
                const canCancel = booking.trang_thai === 'pending';

                return `
                    <div class="room-card">
                        <img src="${booking.room_image || 'https://via.placeholder.com/400x200/667eea/ffffff?text=Room'}" 
                             alt="${booking.room_title}" class="room-image">
                        <div class="room-content">
                            <div class="room-title">${booking.room_title}</div>
                            <div class="room-price">${Number(booking.room_price).toLocaleString()} VNĐ/tháng</div>
                            
                            <div class="room-info">
                                <div class="room-info-item">
                                    <i class="fas fa-calendar"></i>
                                    <span>Ngày nhận: ${ngayNhanPhong}</span>
                                </div>
                                <div class="room-info-item">
                                    <i class="fas fa-users"></i>
                                    <span>${booking.so_nguoi_o || 1} người ở</span>
                                </div>
                            </div>

                            <div class="room-status ${statusClass}">${statusText}</div>
                            
                            <div class="room-actions">
                                <button class="btn btn-view" onclick="viewRoom('${booking.room_id}')">
                                    <i class="fas fa-eye"></i> Xem phòng
                                </button>
                                ${canCancel ? `
                                    <button class="btn btn-cancel" onclick="cancelBooking('${booking.id}')">
                                        <i class="fas fa-times"></i> Hủy đặt
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

        } catch (err) {
            console.error("Lỗi:", err);
            container.innerHTML = `
                <div class="empty-state" style="grid-column: 1/-1;">
                    <div class="empty-icon">⚠️</div>
                    <div class="empty-title">Lỗi tải dữ liệu</div>
                    <div class="empty-text">${err.message}</div>
                    <button class="btn-primary" onclick="loadMyRooms()">
                        <i class="fas fa-refresh"></i> Thử lại
                    </button>
                </div>
            `;
        }
    }

    // Xem chi tiết phòng
    function viewRoom(roomId) {
        window.location.href = `chitiet.html?id=${roomId}`;
    }

    // Hủy đặt phòng
    async function cancelBooking(bookingId) {
        if (!confirm('Bạn có chắc chắn muốn hủy đặt phòng này?\n\nLưu ý: Chủ phòng sẽ cần xác nhận lệnh hủy.')) {
            return;
        }

        const token = localStorage.getItem('token');

        try {
            const res = await fetch(`/api/bookings/${bookingId}/cancel`, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });

            if (res.ok) {
                alert('✅ Đã gửi yêu cầu hủy phòng!\n\nChủ phòng sẽ xác nhận trong thời gian sớm nhất.');
                loadMyRooms(); // Tải lại danh sách
            } else {
                const data = await res.json();
                alert('❌ ' + (data.error || data.message || 'Không thể hủy đặt phòng'));
            }
        } catch (err) {
            console.error("Lỗi:", err);
            alert('⚠️ Có lỗi xảy ra. Vui lòng thử lại sau.');
        }
    }

    // Đăng xuất
    function logout() {
        if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
    }

    // Khởi tạo
    document.addEventListener('DOMContentLoaded', loadMyRooms);
</script>

</body>
</html>
